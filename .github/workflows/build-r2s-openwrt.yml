name: Build R2S OpenWrt

concurrency:
  group: build-r2s-openwrt-${{ github.ref }}
  cancel-in-progress: true

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
#  schedule:
#    - cron: 0 14 * * 5
#      timezone: Asia/Shanghai

jobs:
  build:
    uses: ./.github/workflows/_build-openwrt-reusable.yml
    with:
      ssh: ${{ github.event.inputs.ssh || 'false' }}
      config_file: config/r2s.config
      cache_mixkey: aarch64
      release_prefix: R2S
    secrets: inherit
